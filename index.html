<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Alert</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
background:url('sagarika.jpg') center center/cover no-repeat;
font-family:Arial,sans-serif;
overflow:hidden;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.alert{
color:red;
font-size:50px;
font-weight:bold;
animation:blink 1s infinite;
text-shadow:0 0 20px red;
}

.name{
margin-top:25px;
color:white;
font-size:50px;
font-weight:bold;
text-shadow:0 0 15px white;
}

.scan{
color:#00ff00;
font-size:24px;
margin-top:25px;
}

.bar{
width:320px;
height:25px;
border:2px solid #00ff00;
margin-top:20px;
}

.fill{
width:0%;
height:100%;
background:#00ff00;
animation:load 10s linear infinite;
}

.log{
margin-top:30px;
color:#00ff00;
font-size:18px;
line-height:1.8;
}

@keyframes blink{
50%{
opacity:0;
}
}

@keyframes load{
100%{
width:100%;
}
}
</style>
</head>

<body>

<div class="overlay">

<div class="alert">
⚠ DEVICE COMPROMISED ⚠
</div>

<div class="name">
SAGARIKA
</div>

<div class="scan">
Scanning Device...
</div>

<div class="bar">
<div class="fill"></div>
</div>

<div class="log" id="log">
Connecting...
</div>

</div>

<script>

const messages=[
"Access Granted ✓",
"Reading Contacts...",
"Scanning Photos...",
"Checking Messages...",
"Tracking Location...",
"Uploading Data...",
"System Access Complete ✓"
];

let i=0;

setInterval(()=>{
document.getElementById("log").innerHTML=messages[i];
i=(i+1)%messages.length;
},1500);

setInterval(()=>{
if(document.body.style.backgroundImage==="none"){
document.body.style.backgroundImage="url('sagarika.jpg')";
}else{
document.body.style.backgroundImage="none";
}
},1200);

</script>

</body>
</html>
